<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light" />
  <title>Mildoc Chat - 知识库问答</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div class="app-root">
    <!-- 左侧导航栏，模仿 ChatGPT 的侧边栏风格（仅前端样式，不影响现有接口） -->
    <aside class="nav-sidebar">
      <div class="nav-top">
        <button class="nav-new-chat" type="button">
          <span class="nav-new-chat-icon">＋</span>
          <span>新聊天</span>
        </button>

        <div class="nav-section">
          <div class="nav-section-title">你的聊天</div>
          <div class="nav-item muted">这里会展示你的历史对话（仅样式示意）</div>
        </div>
      </div>

      <div class="nav-bottom">
        <div class="nav-section">
          <div class="nav-item">在线 RAG 服务推荐</div>
          <div class="nav-item">curl 命令解析</div>
          <div class="nav-item">Gemini / GPT 对比分析</div>
        </div>

        <div class="nav-user">
          <div class="nav-user-avatar">M</div>
          <div class="nav-user-info">
            <div class="nav-user-name">Mildoc 用户</div>
            <div class="nav-user-desc">企业知识库助手</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- 右侧主聊天区域 -->
    <div class="shell">
      <header class="header">
        <div class="title">
          <div class="logo-dot"></div>
          <div class="title-text">
            <h1>Mildoc Chat</h1>
            <span>企业文档知识库 · RAG 问答</span>
          </div>
        </div>
        <div class="badge">
          <span class="badge-dot"></span>
          <span id="status-label">RAG 服务已连接</span>
        </div>
      </header>

      <main class="layout">
        <section class="chat-main">
          <div class="messages" id="messages"></div>

          <!-- 底部卡片：包含本次回答的引用来源与统计信息 + 输入框与发送按钮 -->
          <div class="chat-footer-card">
            <section class="insights" id="insights"></section>

            <div class="input-area">
              <div class="input-row">
                <textarea
                  id="input"
                  placeholder="请输入你的问题，例如：知识库里的某个合同有哪些关键条款？"
                ></textarea>
                <button id="rag-toggle-btn" type="button" class="rag-toggle on" title="使用知识库检索（当前：开）。点击切换">
                  <span id="rag-toggle-label">知识库</span>
                </button>
                <button id="send-btn" type="button">
                  <span id="send-label">➤</span>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- Markdown 解析库（前端将模型返回的 Markdown 转成 HTML 渲染） -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
