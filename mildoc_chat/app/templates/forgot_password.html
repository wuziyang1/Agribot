<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Mildoc Chat 找回密码</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css', v='3') }}" />
</head>
<body>
  <div class="login-root">
    <div class="login-card">
      <form id="forgot-form">
        <h2 class="login-title-main">找回密码</h2>
        <p class="login-subtitle">通过邮箱验证码重置你的登录密码</p>

        <div class="form-group">
          <input
            id="fp-username"
            name="username"
            type="text"
            placeholder="用户名"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <input
            id="fp-email"
            name="email"
            type="email"
            placeholder="绑定邮箱"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group fp-code-row">
          <input
            id="fp-code"
            name="verification_code"
            type="text"
            placeholder="邮箱验证码"
            inputmode="numeric"
            autocomplete="one-time-code"
            required
          />
          <button id="fp-send-code" class="login-btn-secondary" type="button">
            发送验证码
          </button>
        </div>

        <div class="form-group">
          <input
            id="fp-new-password"
            name="new_password"
            type="password"
            placeholder="新密码（至少 6 位）"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="login-error" id="fp-error" style="display: none;"></div>

        <button class="login-btn-primary" id="fp-submit" type="button">
          重 置 密 码
        </button>
      </form>

      <div class="footer-links">
        <a href="{{ url_for('login') }}">返回登录</a>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/forgot_password.js') }}"></script>
</body>
</html>
