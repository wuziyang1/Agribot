<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Mildoc Chat 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css', v='3') }}" />
</head>
<body>
  <div class="login-root">
    <div class="login-card">
      <form id="login-form" method="post" action="{{ url_for('mildoc_chat_login.login_post') }}">
        <h2 class="login-title-main">登录 Mildoc Chat</h2>
        <p class="login-subtitle">请输入账号密码以继续</p>

        <div class="form-group">
          <input
            id="username"
            name="username"
            type="text"
            placeholder="用户名 / 邮箱"
            autocomplete="username"
            value="{{ last_username or '' }}"
            required
          />
        </div>

        <div class="form-group">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="密码"
            autocomplete="current-password"
            required
          />
        </div>

        {% if error_message %}
        <div class="login-error">{{ error_message }}</div>
        {% endif %}

        <button class="login-btn-primary" type="submit">
          登 录
        </button>
      </form>

      <div class="footer-links">
        <a href="{{ url_for('forgot_password') }}">忘记密码？</a>
        <span>·</span>
        <a href="{{ url_for('mildoc_chat_register.register') }}">注册账号</a>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
