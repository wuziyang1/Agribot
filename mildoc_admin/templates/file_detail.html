{% extends "base.html" %}

{% block title %}文件详情 - Mildoc 管理后台{% endblock %}

{% block content %}
<div class="file-detail">
    <div class="file-detail-header">
        <h2 class="file-title" id="file-title">文件详情</h2>
        <div class="header-actions">
            <a href="#" id="download-btn" class="download-btn">下载地址</a>
            <a href="#" id="delete-btn" class="delete-btn">删除文件</a>
            <a href="#" id="back-btn" class="back-btn">← 返回文件列表</a>
        </div>
    </div>

    <div id="file-info" class="file-info">
        <div class="loading">加载中...</div>
    </div>

    <div id="file-chunks" class="file-chunks" style="display: none;">
        <h3 class="chunks-title">文件分片信息</h3>
        <div class="chunks-toggle">
            <button id="expand-all" class="btn btn-secondary">展开全部</button>
            <button id="collapse-all" class="btn btn-secondary">折叠全部</button>
        </div>
        <div id="chunks-content" class="chunks-content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/file_detail.js') }}"></script>
{% endblock %}
